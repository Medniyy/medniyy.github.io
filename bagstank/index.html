<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAGS.FM SHARK TANK | Powered by ATH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #050505; color: white; }
        .font-bebas { font-family: 'Bebas Neue', sans-serif; }
        
        /* Виральные анимации */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(132, 204, 22, 0.2); }
            50% { box-shadow: 0 0 20px rgba(132, 204, 22, 0.6); }
        }
        .animate-glow { animation: pulse-glow 2s infinite; }
        
        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s, border-color 0.2s;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            border-color: rgba(132, 204, 22, 0.5);
        }

        /* Адаптация сетки для мобильных */
        @media (max-width: 640px) {
            .mobile-stack { flex-direction: column; }
            .mobile-full { width: 100%; }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-black via-gray-900 to-black overflow-x-hidden">

    <header class="p-4 border-b border-gray-800 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center mobile-stack gap-4">
            
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-lime-400 flex items-center justify-center shadow-[0_0_15px_rgba(163,230,53,0.5)]">
                    <span class="text-black font-bold text-xl">$</span>
                </div>
                <div>
                    <h1 class="text-2xl font-bebas tracking-wider text-white leading-none">BAGS.FM <span class="text-lime-400">SHARK TANK</span></h1>
                    <a href="https://x.com/intent/follow?screen_name=athcamera" target="_blank" class="text-xs text-gray-400 hover:text-white transition uppercase tracking-widest">
                        Powered by ATH
                    </a>
                </div>
            </div>

            <div class="flex gap-2 mobile-full">
                <button onclick="connectWallet('phantom')" class="flex-1 px-4 py-2 bg-purple-900/30 hover:bg-purple-900/50 border border-purple-500/30 rounded-lg flex items-center gap-2 transition group">
                    <svg class="w-5 h-5 fill-purple-400 group-hover:fill-white transition" viewBox="0 0 32 32"><path d="M25.8 17.6c-.6-2.1-2.2-3.8-4.2-4.4-1.6-.5-3.1-.3-4.5.4l-.2.1c-.3.2-.6.3-1 .2-.3-.1-.5-.4-.5-.7v-.1c.3-1.6.4-3.1.2-4.5-.4-2.3-2.2-4.2-4.6-4.6-3-.5-5.7 1.5-6.2 4.4-.5 2.8 1.1 5.4 3.8 6.2.3.1.5.3.6.6v.1c.1.4-.2.8-.6 1-.9.3-1.8.8-2.5 1.5-2.5 2.2-2.8 6-.7 8.5 1.8 2.2 4.9 2.8 7.4 1.6.4-.2.9-.2 1.2.2.8 1 2.1 1.6 3.4 1.6 2.3 0 4.3-1.8 4.6-4.1.3-2.1-.8-4.1-2.6-5.2-.4-.2-.5-.7-.3-1 .6-1.1.8-2.3.6-3.5z"/></svg>
                    <span class="text-sm font-bold text-purple-200">Phantom</span>
                </button>

                <button onclick="connectWallet('solflare')" class="flex-1 px-4 py-2 bg-orange-900/30 hover:bg-orange-900/50 border border-orange-500/30 rounded-lg flex items-center gap-2 transition group">
                    <svg class="w-5 h-5 fill-orange-400 group-hover:fill-white transition" viewBox="0 0 380 380"><path d="M96.4 23.2C54.4 23.2 20 57.6 20 99.6v180.8c0 42 34.4 76.4 76.4 76.4h187.2c42 0 76.4-34.4 76.4-76.4V99.6c0-42-34.4-76.4-76.4-76.4H96.4z" fill="#000" fill-opacity="0"/><path d="M84.2 210.6c17.2 48.2 62.8 82.8 116.6 82.8 53.8 0 99.4-34.6 116.6-82.8H84.2z" fill="#FC762B"/><path d="M198 259.6c-48.4 0-89.6-28.8-108.6-70.4h217.2c-19 41.6-60.2 70.4-108.6 70.4z" fill="#FCA048"/><path d="M200.8 86.6c-53.8 0-99.4 34.6-116.6 82.8h233.2c-17.2-48.2-62.8-82.8-116.6-82.8z" fill="#2A2A2A"/></svg>
                    <span class="text-sm font-bold text-orange-200">Solflare</span>
                </button>
            </div>
        </div>
    </header>

    <div class="border-b border-gray-800 bg-black/30">
        <div class="max-w-7xl mx-auto px-4 py-2 flex justify-between items-center text-xs text-gray-400">
            <div id="statusIndicator" class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-lime-500 animate-pulse"></span>
                <span>Live Feed</span>
            </div>
            <div id="walletAddress">Not connected</div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div id="tokenGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="glass-card p-6 rounded-xl animate-pulse h-48 flex items-center justify-center">
                <span class="text-lime-400 font-mono">Scanning Solana Chain...</span>
            </div>
        </div>
    </main>

    <script>
        // CONFIG
        const WORKER_URL = 'https://bags-shark-tank-api.privetandreynugdejeti.workers.dev'; 
        let connectedWallet = null;

        // --- WALLET LOGIC ---
        async function connectWallet(providerName) {
            try {
                let provider = null;
                
                if (providerName === 'phantom') {
                    provider = window.phantom?.solana;
                    if (!provider) return alert('Phantom not installed!');
                } else if (providerName === 'solflare') {
                    provider = window.solflare;
                    if (!provider) return alert('Solflare not installed!');
                }

                if (!provider) return alert('Wallet provider not found');

                // Connect
                const resp = await provider.connect();
                const publicKey = resp.publicKey.toString();
                
                connectedWallet = publicKey;
                
                // UI Update
                document.getElementById('walletAddress').innerHTML = 
                    `<span class="text-lime-400">●</span> ${publicKey.slice(0,4)}...${publicKey.slice(-4)}`;
                
                alert(`✅ ${providerName.toUpperCase()} Connected!`);

            } catch (err) {
                console.error(err);
                alert('Connection cancelled');
            }
        }

        // --- DATA FETCHING ---
        async function fetchTokens() {
            try {
                const response = await fetch(WORKER_URL);
                if (!response.ok) throw new Error("API Error");
                const tokens = await response.json();
                renderTokens(tokens);
            } catch (error) {
                console.error("Fetch error:", error);
            }
        }

        function renderTokens(tokens) {
            const grid = document.getElementById('tokenGrid');
            grid.innerHTML = ''; // Clear loading

            tokens.forEach(token => {
                const isHot = token.liquidity > 20000; // Highlight if liquidity > $20k
                
                // Logo Logic (Fallback to generated avatar if no image)
                const logoHtml = token.image 
                    ? `<img src="${token.image}" class="w-12 h-12 rounded-full border border-gray-700 object-cover">`
                    : `<div class="w-12 h-12 rounded-full bg-gradient-to-tr from-gray-800 to-gray-700 border border-gray-600 flex items-center justify-center text-xs font-bold text-gray-400">${token.symbol.slice(0,2)}</div>`;

                const card = document.createElement('div');
                card.className = `glass-card p-5 rounded-2xl relative overflow-hidden group ${isHot ? 'border-lime-500/30' : ''}`;
                
                card.innerHTML = `
                    ${isHot ? '<div class="absolute top-0 right-0 bg-lime-500/20 text-lime-400 text-[10px] font-bold px-2 py-1 rounded-bl-lg">HOT</div>' : ''}
                    
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            ${logoHtml}
                            <div>
                                <h3 class="text-xl font-bold text-white leading-tight">${token.name}</h3>
                                <p class="text-sm text-gray-500 font-mono tracking-widest">$${token.symbol}</p>
                            </div>
                        </div>
                        <span class="text-xs px-2 py-1 rounded bg-gray-800 text-gray-400 border border-gray-700 whitespace-nowrap">${token.launchTime}</span>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="bg-black/40 p-3 rounded-lg border border-white/5">
                            <p class="text-[10px] uppercase text-gray-500 font-bold mb-1">Liquidity</p>
                            <p class="text-lg font-mono ${token.liquidity > 10000 ? 'text-lime-400' : 'text-white'}">$${token.liquidity.toLocaleString()}</p>
                        </div>
                        <div class="bg-black/40 p-3 rounded-lg border border-white/5">
                            <p class="text-[10px] uppercase text-gray-500 font-bold mb-1">Mkt Cap</p>
                            <p class="text-lg font-mono text-white">$${token.marketCap.toLocaleString()}</p>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <a href="https://jup.ag/swap/SOL-${token.mint}?referrer=ATH" target="_blank" 
                           class="flex-1 bg-lime-500 hover:bg-lime-400 text-black font-bold py-3 rounded-xl text-center transition flex items-center justify-center gap-2">
                            <span>BUY NOW</span>
                        </a>
                        <button onclick="shareToken('${token.symbol}', '${token.mint}')" class="px-4 bg-gray-800 hover:bg-gray-700 rounded-xl border border-gray-700 transition">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                        </button>
                    </div>
                    
                    <div class="mt-3 text-[10px] text-gray-600 font-mono truncate cursor-pointer hover:text-lime-400 transition" onclick="navigator.clipboard.writeText('${token.mint}')">
                        CA: ${token.mint}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function shareToken(symbol, mint) {
            const text = `Found a new gem $${symbol} on #BAGS Shark Tank! 🦈\n\nCA: ${mint}\n\nAnalysis by @athcamera #Solana`;
            const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        // AUTO-REFRESH
        fetchTokens();
        setInterval(fetchTokens, 15000);

    </script>
</body>
</html>
