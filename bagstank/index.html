<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGS.FM ONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #000; color: white; overflow: hidden; }
        .font-bebas { font-family: 'Bebas Neue', sans-serif; }
        #main-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 50px rgba(132, 204, 22, 0.1); }
        .scanner-line { width: 100%; height: 2px; background: #84cc16; animation: scan 2s infinite; }
        @keyframes scan { 0% { transform: translateY(-100px); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="disclaimer-modal" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-bebas text-white mb-2">SHARK TANK</h1>
        <p class="text-gray-400 mb-8">Tracking the latest active token on Bags.fm<br>High Risk.</p>
        <button onclick="startApp()" class="bg-lime-500 hover:bg-lime-400 text-black font-bebas text-2xl py-3 px-12 rounded-full transition">START</button>
    </div>

    <div id="main-container">
        <div id="loader" class="text-center">
            <div class="mb-4 text-lime-400 font-bebas text-2xl animate-pulse">SCANNING BAGS.FM...</div>
            <div class="w-16 h-1 bg-gray-800 rounded overflow-hidden mx-auto"><div class="scanner-line"></div></div>
        </div>

        <div id="token-card" class="hidden w-full max-w-md p-6">
            <div class="glass-card rounded-3xl p-8 text-center relative border-t-4 border-lime-500">
                <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-lime-500 text-black font-bold px-4 py-1 rounded-b-lg text-xs tracking-widest">
                    LATEST SIGNAL
                </div>

                <img id="t-img" src="" class="w-28 h-28 mx-auto mb-4 rounded-full border-4 border-white/10 object-cover bg-black">
                
                <h1 id="t-symbol" class="text-5xl font-bebas text-white mb-1"></h1>
                <p id="t-name" class="text-gray-500 text-sm mb-6 truncate"></p>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-white/5 rounded-xl p-3">
                        <div class="text-[10px] text-gray-500 uppercase font-bold">Liquidity</div>
                        <div id="t-liq" class="text-xl font-bebas text-lime-400">-</div>
                    </div>
                    <div class="bg-white/5 rounded-xl p-3">
                        <div class="text-[10px] text-gray-500 uppercase font-bold">Vol 5m</div>
                        <div id="t-vol" class="text-xl font-bebas text-white">-</div>
                    </div>
                </div>

                <button onclick="buyToken()" id="buy-btn" class="w-full bg-lime-500 hover:bg-lime-400 text-black font-bebas text-2xl py-4 rounded-xl shadow-lg mb-3 transition hover:scale-[1.02]">
                    OPEN ↗
                </button>
                
                <div class="flex gap-2">
                    <button onclick="openAnalytics()" class="flex-1 bg-white/10 hover:bg-white/20 text-white font-bebas py-3 rounded-xl transition">VERDICT</button>
                    <button onclick="copyCA()" class="flex-1 bg-white/10 hover:bg-white/20 text-gray-400 hover:text-white font-bebas py-3 rounded-xl transition">COPY CA</button>
                </div>
            </div>
        </div>
    </div>

    <div id="analytics-modal" class="fixed inset-0 z-[60] bg-black/90 hidden flex items-center justify-center p-4">
        <div class="w-full max-w-sm glass-card rounded-3xl p-6 relative">
            <button onclick="document.getElementById('analytics-modal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-500 hover:text-white">✕</button>
            <div id="analytics-content"></div>
        </div>
    </div>

    <script>
        const WORKER = 'https://bags-shark-tank-api.privetandreynugdejeti.workers.dev';
        let currentToken = null;

        function startApp() {
            document.getElementById('disclaimer-modal').style.display = 'none';
            fetchToken();
            setInterval(fetchToken, 8000);
        }

        async function fetchToken() {
            try {
                const res = await fetch(WORKER);
                const data = await res.json();
                if(data.length > 0) renderToken(data[0]);
            } catch(e) { console.error(e); }
        }

        function renderToken(t) {
            currentToken = t;
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('token-card').classList.remove('hidden');
            
            document.getElementById('t-img').src = t.image || 'bags-logo.png';
            document.getElementById('t-symbol').innerText = `$${t.symbol}`;
            document.getElementById('t-name').innerText = t.name;
            document.getElementById('t-liq').innerText = `$${Math.floor(t.liquidity).toLocaleString()}`;
            document.getElementById('t-vol').innerText = `$${Math.floor(t.volume5m).toLocaleString()}`;
            
            const btn = document.getElementById('buy-btn');
            // Если ликвидность < 5000, значит токен только на Bags (Bonding curve)
            // Если больше - значит вышел на Raydium -> Jupiter
            btn.innerText = t.liquidity < 5000 ? "BUY ON BAGS ↗" : "BUY ON JUPITER ↗";
        }

        function buyToken() {
            if(!currentToken) return;
            const url = currentToken.liquidity < 5000 
                ? `https://bags.fm/${currentToken.mint}`
                : `https://jup.ag/swap/SOL-${currentToken.mint}`;
            window.open(url, '_blank');
        }

        function openAnalytics() {
            if(!currentToken) return;
            const score = Math.min(10, Math.floor((currentToken.liquidity / 3000) + (currentToken.volume5m / 1000)));
            const verdict = score > 7 ? "STRONG IN 🟢" : (score > 4 ? "WATCH 🟡" : "OUT 🔴");
            
            const html = `
                <div class="text-center border-b border-white/10 pb-4 mb-4">
                    <h2 class="text-4xl font-bebas text-white">${verdict}</h2>
                    <p class="text-gray-400 text-sm">Score: ${score}/10</p>
                </div>
                <div class="space-y-2 text-sm text-gray-400">
                    <p>Analysis based on Volume & Liquidity.</p>
                    <div class="flex justify-between"><span class="text-white">Market Cap:</span> $${Math.floor(currentToken.marketCap)}</div>
                </div>
            `;
            document.getElementById('analytics-content').innerHTML = html;
            document.getElementById('analytics-modal').classList.remove('hidden');
        }

        function copyCA() {
            if(currentToken) {
                navigator.clipboard.writeText(currentToken.mint);
                alert("CA Copied!");
            }
        }
    </script>
</body>
</html>
