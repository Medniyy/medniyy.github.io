<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGS.FM SHARK TANK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://terminal.jup.ag/main-v3.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #000; color: white; overflow: hidden; }
        .font-bebas { font-family: 'Bebas Neue', sans-serif; }
        #feed-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .token-slide { height: 100vh; scroll-snap-align: start; position: relative; overflow: hidden; }
        .glass-panel { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .animate-enter { animation: float-up 0.5s ease-out forwards; }
        @keyframes float-up { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-50 p-4 pointer-events-none">
        <div class="max-w-md mx-auto flex justify-between items-center pointer-events-auto">
            <div class="flex items-center gap-3">
                <img src="bags-logo.png" onerror="this.src='https://placehold.co/40x40/000/FFF?text=$'" class="w-10 h-10 rounded-full border border-lime-500 shadow-lg">
                <div>
                    <h1 class="text-xl font-bebas leading-none">BAGS.FM <span class="text-lime-400">SHARK</span></h1>
                </div>
            </div>
            <button id="wallet-btn" onclick="connectWallet()" class="glass-panel px-5 py-2 rounded-full font-bold hover:bg-lime-500 hover:text-black transition text-sm flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full" id="wallet-dot"></span>
                <span id="wallet-text">Connect</span>
            </button>
        </div>
    </header>

    <div id="feed-container">
        <div class="h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="animate-spin w-12 h-12 border-4 border-lime-400 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p class="text-lime-400 font-bebas text-xl">Connecting to Bags.fm...</p>
            </div>
        </div>
    </div>

    <div id="jupiter-overlay" class="fixed inset-0 z-[70] hidden bg-black/80 flex items-center justify-center backdrop-blur-sm p-4">
        <div class="relative w-full max-w-[400px] bg-[#304256] rounded-3xl overflow-hidden shadow-2xl animate-enter">
            <button onclick="closeJupiter()" class="absolute top-4 right-4 z-50 text-white/50 hover:text-white bg-black/20 hover:bg-black/50 rounded-full w-8 h-8 flex items-center justify-center transition">✕</button>
            <div id="integrated-terminal" class="w-full h-[600px]"></div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://bags-shark-tank-api.privetandreynugdejeti.workers.dev';
        
        // 🔴 30de9940-f297-4c42-94a2-456b08e9194b 🔴
        const HELIUS_KEY = '30de9940-f297-4c42-94a2-456b08e9194b'; 
        // 🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴🔴

        let walletProvider = null;

        // 1. ПОДКЛЮЧЕНИЕ КОШЕЛЬКА (Phantom/Solflare)
        async function connectWallet() {
            try {
                // Ищем провайдер
                const provider = window.phantom?.solana || window.solflare;
                
                if (!provider) {
                    return alert("Wallet not found. Please install Phantom!");
                }

                if (!provider.isConnected) {
                    await provider.connect();
                }

                walletProvider = provider;
                const key = provider.publicKey.toString();
                
                // UI
                document.getElementById('wallet-text').innerText = key.slice(0,4) + '..' + key.slice(-4);
                document.getElementById('wallet-btn').classList.add('bg-lime-500', 'text-black');
                document.getElementById('wallet-dot').classList.replace('bg-red-500', 'bg-black');

                // Sync with Jupiter
                if (window.Jupiter) {
                    window.Jupiter.syncProps({ passthroughWalletContextState: { wallet: provider } });
                }

            } catch (err) {
                console.error("Wallet Error:", err);
            }
        }

        // 2. ПОЛУЧЕНИЕ ДАННЫХ
        async function fetchTokens() {
            try {
                const res = await fetch(WORKER_URL);
                const tokens = await res.json();
                renderFeed(tokens);
            } catch (e) {
                console.error("Fetch Error:", e);
                // Показываем ошибку красиво, а не ломаем сайт
                renderFeed([{
                    name: "Connection Error",
                    symbol: "RETRY",
                    mint: "error",
                    launchTime: "Check Console"
                }]);
            }
        }

        function renderFeed(tokens) {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            
            tokens.forEach(token => {
                // Логика "Ожидания"
                const isWaiting = token.mint === "waiting_mode" || token.mint === "error";
                const canBuy = !isWaiting && token.mint.length > 30;

                const slide = document.createElement('div');
                slide.className = 'token-slide flex items-center justify-center p-4 snap-center';
                slide.innerHTML = `
                    <div class="glass-panel w-full max-w-md rounded-3xl p-6 text-center relative animate-enter shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                        
                        <div class="absolute top-4 right-4 ${isWaiting ? 'bg-yellow-500/20 text-yellow-400' : 'bg-lime-500 text-black'} text-xs font-bold px-3 py-1 rounded-full border border-white/10">
                            ${isWaiting ? 'SCANNING' : 'LIVE ON BAGS'}
                        </div>
                        
                        <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-black/50 border-2 ${isWaiting ? 'border-yellow-500/50 animate-pulse' : 'border-lime-500'} flex items-center justify-center text-3xl shadow-xl">
                            ${isWaiting ? '📡' : '🦈'}
                        </div>
                        
                        <h2 class="text-5xl font-bebas text-white mb-1 tracking-wide">$${token.symbol}</h2>
                        <p class="text-gray-400 mb-8 font-mono text-sm">${token.name}</p>
                        
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <div class="bg-black/40 rounded-xl p-3 border border-white/5">
                                <div class="text-[10px] text-gray-500 uppercase font-bold">Time</div>
                                <div class="text-white font-mono">${token.launchTime}</div>
                            </div>
                             <div class="bg-black/40 rounded-xl p-3 border border-white/5">
                                <div class="text-[10px] text-gray-500 uppercase font-bold">Source</div>
                                <div class="text-lime-400 font-mono">Bags.fm</div>
                            </div>
                        </div>

                        ${canBuy ? `
                            <button onclick="openJupiter('${token.mint}')" class="w-full bg-lime-500 hover:bg-lime-400 text-black font-bebas text-2xl py-4 rounded-xl transition shadow-lg shadow-lime-500/20 transform hover:scale-[1.02]">
                                BUY NOW
                            </button>
                            <div class="mt-4 flex justify-center gap-4 text-xs text-gray-500">
                                <a href="https://solscan.io/tx/${token.tx}" target="_blank" class="hover:text-white underline decoration-dotted">View TX</a>
                                <span class="text-gray-700">|</span>
                                <span class="font-mono cursor-pointer hover:text-white" onclick="navigator.clipboard.writeText('${token.mint}')">Copy CA</span>
                            </div>
                        ` : `
                            <div class="w-full bg-white/5 text-gray-400 font-bebas text-xl py-4 rounded-xl border border-white/10">
                                ${token.mint === 'error' ? 'API ERROR' : 'WAITING FOR LAUNCH...'}
                            </div>
                            <p class="mt-4 text-xs text-gray-600">Watching contract: BAGS...Amcv</p>
                        `}
                    </div>
                `;
                container.appendChild(slide);
            });
        }

        // 3. JUPITER WIDGET
        function openJupiter(mint) {
            const overlay = document.getElementById('jupiter-overlay');
            overlay.classList.remove('hidden');
            
            if (!window.Jupiter._instance) {
                window.Jupiter.init({ 
                    displayMode: 'integrated',
                    integratedTargetId: 'integrated-terminal',
                    endpoint: `https://mainnet.helius-rpc.com/?api-key=${HELIUS_KEY}`,
                    formProps: {
                        fixedOutputMint: true,
                        initialOutputMint: mint,
                    }
                });
            } else {
                window.Jupiter.resume();
            }

            // Sync wallet again to be sure
            if (walletProvider) {
                window.Jupiter.syncProps({ passthroughWalletContextState: { wallet: walletProvider } });
            }
        }

        function closeJupiter() {
            document.getElementById('jupiter-overlay').classList.add('hidden');
        }

        // Auto-refresh every 10 seconds
        fetchTokens();
        setInterval(fetchTokens, 10000);

    </script>
</body>
</html>
