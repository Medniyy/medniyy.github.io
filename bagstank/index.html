<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGS.FM SHARK TANK</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://terminal.jup.ag/main-v3.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #000; color: white; overflow: hidden; }
        .font-bebas { font-family: 'Bebas Neue', sans-serif; }
        
        #feed-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .token-slide { height: 100vh; scroll-snap-align: start; position: relative; overflow: hidden; }

        .glass-panel { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-modal { background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(20px); }
        
        @keyframes pulse-border { 0%, 100% { border-color: rgba(132, 204, 22, 0.3); } 50% { border-color: rgba(132, 204, 22, 0.8); } }
        .animate-border { animation: pulse-border 2s infinite; }
        @keyframes float-up { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .animate-enter { animation: float-up 0.5s ease-out forwards; }
        
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>

                </div>
            </div>
