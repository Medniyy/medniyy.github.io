<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAGS.FM Shark Tank by ATH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-black via-gray-900 to-black min-h-screen">
  
  <div class="fixed inset-0 opacity-40 pointer-events-none">
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-gradient-to-br from-green-500 to-cyan-400 rounded-full filter blur-3xl animate-pulse"></div>
    <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-gradient-to-br from-cyan-400 to-lime-400 rounded-full filter blur-3xl animate-pulse delay"></div>
  </div>

  <div class="relative z-10 container mx-auto px-4 sm:px-6 py-8 sm:py-12 max-w-7xl">
    
    <div class="text-center mb-12 sm:mb-16 animate-fade-in">
      
      <div class="absolute top-4 right-4">
        <button id="wallet-btn" class="flex items-center gap-2 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-bold px-4 py-2 rounded-full transition-all duration-300 hover:scale-105 shadow-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
          <span id="wallet-text">Connect Wallet</span>
        </button>
        <div id="wallet-selector" class="hidden absolute top-14 right-0 bg-gray-900 border border-cyan-500 rounded-xl p-4 shadow-2xl z-50 min-w-[250px]">
          <h3 class="text-white font-bold mb-3">Select Wallet</h3>
          <button class="wallet-option w-full flex items-center gap-3 p-3 rounded-lg hover:bg-gray-800 transition-colors mb-2" data-wallet="phantom">
            <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center text-white font-bold">P</div>
            <span class="text-white font-semibold">Phantom</span>
          </button>
          <button class="wallet-option w-full flex items-center gap-3 p-3 rounded-lg hover:bg-gray-800 transition-colors mb-2" data-wallet="solflare">
            <div class="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center text-white font-bold">S</div>
            <span class="text-white font-semibold">Solflare</span>
          </button>
          <button class="wallet-option w-full flex items-center gap-3 p-3 rounded-lg hover:bg-gray-800 transition-colors" data-wallet="backpack">
            <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-pink-500 rounded-lg flex items-center justify-center text-white font-bold">B</div>
            <span class="text-white font-semibold">Backpack</span>
          </button>
        </div>
      </div>
      
      <div class="mb-6 flex justify-center">
        <div class="relative group">
          <div class="absolute inset-0 bg-gradient-to-r from-lime-400 via-green-500 to-lime-400 rounded-full blur-2xl opacity-50 group-hover:opacity-75 transition-opacity scale-110"></div>
          <div class="relative bg-black rounded-full p-2 border-2 border-lime-400/30 group-hover:border-lime-400 transition-all">
            <img src="bags-logo.png" alt="bags.fm" class="w-20 h-20 sm:w-24 sm:h-24 animate-float">
          </div>
        </div>
      </div>
      
      <div class="inline-block mb-4">
        <div class="flex items-center gap-3 sm:gap-4 bg-gradient-to-r from-lime-400 via-green-500 to-lime-400 px-6 sm:px-8 py-2 sm:py-3 rounded-full shadow-2xl shadow-lime-500/50">
          <span class="text-2xl sm:text-3xl">⚡</span>
          <h1 class="text-3xl sm:text-4xl font-black text-black tracking-tight" style="font-family: 'Bebas Neue';">BAGS.FM SHARK TANK</h1>
          <span class="text-2xl sm:text-3xl">⚡</span>
        </div>
      </div>
      
      <a href="https://x.com/intent/follow?screen_name=athcamera" target="_blank" class="inline-block group">
        <p class="text-lg sm:text-xl font-light" style="font-family: 'Rajdhani';">
          <span class="text-gray-500">Powered by</span>
          <span class="text-lime-400 font-bold group-hover:text-green-400 transition-colors"> ATH Creative Studio</span>
        </p>
      </a>
      
      <p class="text-sm text-gray-400 mt-2"><span id="status-text">Loading latest tokens...</span></p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 mb-8 sm:mb-12" id="projects-grid">
      <div class="col-span-full text-center py-12">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-lime-400 border-t-transparent mx-auto mb-4"></div>
        <p class="text-gray-400">Fetching tokens from Solana...</p>
      </div>
    </div>

    <div id="analysis-panel" class="hidden bg-gradient-to-br from-gray-900/95 to-black/90 backdrop-blur-2xl border-2 border-cyan-500/50 rounded-3xl p-6 sm:p-8 shadow-2xl shadow-cyan-500/30 animate-slide-up">
      <div class="flex items-center justify-between mb-6 sm:mb-8 flex-wrap gap-4">
        <h2 class="text-2xl sm:text-3xl font-black text-white" style="font-family: 'Bebas Neue';">SHARK TANK VERDICT</h2>
        <div class="flex gap-2">
          <button id="buy-btn" class="flex items-center gap-2 bg-gradient-to-r from-green-500 to-lime-400 hover:from-green-600 hover:to-lime-500 text-black font-bold px-4 sm:px-6 py-2 sm:py-3 rounded-full transition-all duration-300 hover:scale-105 shadow-lg shadow-green-400/50" style="font-family: 'Rajdhani';">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            <span>Buy</span>
          </button>
          <button id="twitter-share-btn" class="flex items-center gap-2 bg-gradient-to-r from-lime-400 to-green-500 hover:from-lime-500 hover:to-green-600 text-black font-bold px-4 sm:px-6 py-2 sm:py-3 rounded-full transition-all duration-300 hover:scale-105 shadow-lg shadow-lime-400/50" style="font-family: 'Rajdhani';">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            <span>Tweet</span>
          </button>
        </div>
      </div>
      <div id="verdict-content"></div>
      <div id="screenshot-watermark" class="hidden text-center mt-6 pt-6 border-t border-cyan-500/30">
        <p class="text-lg font-light" style="font-family: 'Rajdhani';"><span class="text-gray-500">Powered by</span><span class="text-lime-400 font-bold"> ATH Creative Studio</span></p>
      </div>
    </div>
  </div>

  <script>
    let wallet=null,currentProject=null,currentAnalysis=null;
    const API_ENDPOINT='https://bags-shark-tank-api.athcamera.workers.dev';
    
    document.getElementById('wallet-btn').addEventListener('click',()=>document.getElementById('wallet-selector').classList.toggle('hidden'));
    
    document.querySelectorAll('.wallet-option').forEach(btn=>{
      btn.addEventListener('click',async()=>{
        const type=btn.dataset.wallet;
        try{
          let provider;
          if(type==='phantom'&&window.solana?.isPhantom)provider=window.solana;
          else if(type==='solflare'&&window.solflare)provider=window.solflare;
          else if(type==='backpack'&&window.backpack)provider=window.backpack;
          else{alert(`${type.charAt(0).toUpperCase()+type.slice(1)} wallet not installed`);return;}
          const resp=await provider.connect();
          wallet={publicKey:resp.publicKey.toString(),provider:provider};
          document.getElementById('wallet-text').textContent=wallet.publicKey.slice(0,4)+'...'+wallet.publicKey.slice(-4);
          document.getElementById('wallet-selector').classList.add('hidden');
        }catch(e){console.error(e);alert('Failed to connect wallet');}
      });
    });
    
    async function fetchTokens(){
      try{
        const response=await fetch(API_ENDPOINT);
        if(!response.ok)throw new Error('API error');
        const tokens=await response.json();
        if(tokens.length===0){
          document.getElementById('projects-grid').innerHTML='<div class="col-span-full text-center py-12"><p class="text-gray-400 text-lg">No active tokens found. Check back soon!</p></div>';
          document.getElementById('status-text').textContent='No active launches right now';
          return;
        }
        renderProjects(tokens);
        document.getElementById('status-text').textContent=`${tokens.length} live tokens`;
      }catch(e){
        console.error(e);
        document.getElementById('projects-grid').innerHTML='<div class="col-span-full text-center py-12"><p class="text-red-400 text-lg">⚠️ API unavailable. Using demo data.</p></div>';
        setTimeout(()=>renderProjects(getDemoTokens()),1000);
        document.getElementById('status-text').textContent='Demo mode (API offline)';
      }
    }
    
    function getDemoTokens(){
      return[
        {name:"MOONCAT",symbol:"MOON",mint:"7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU",liquidity:45000,holders:342,marketCap:125000,launchTime:"2 hours ago"},
        {name:"DEGENAPE",symbol:"DAPE",mint:"9vMJfxuKxXBoEa7rM12mYLMwTacLMLDJqHozw96WQL8i",liquidity:12000,holders:89,marketCap:38000,launchTime:"45 minutes ago"},
        {name:"BASED",symbol:"BASED",mint:"5Q544fKrFoe6tsEbD7S8EmxGTJYAKtTVhAW5Q5pge4j1",liquidity:78000,holders:567,marketCap:234000,launchTime:"5 hours ago"},
        {name:"PUMP",symbol:"PUMP",mint:"Gh9ZwEmdLJ8DscKNTkTqPbNwLNNBjuSzaG9Vp2KGtKJr",liquidity:5500,holders:23,marketCap:15000,launchTime:"15 minutes ago"}
      ];
    }
    
    function renderProjects(projects){
      const grid=document.getElementById('projects-grid');
      grid.innerHTML='';
      projects.forEach((p,i)=>{
        const card=document.createElement('div');
        card.className='group relative bg-gradient-to-br from-gray-900/80 to-black/60 backdrop-blur-xl border border-cyan-500/30 rounded-2xl p-4 sm:p-6 cursor-pointer transition-all duration-300 hover:scale-105 hover:shadow-2xl hover:shadow-lime-400/50 hover:border-lime-400 animate-fade-in';
        card.style.animationDelay=`${i*100}ms`;
        card.innerHTML=`<div class="absolute top-3 sm:top-4 right-3 sm:right-4"><span class="px-2 sm:px-3 py-1 bg-lime-400/20 border border-lime-400/50 text-lime-300 text-xs font-bold rounded-full animate-pulse">LIVE</span></div><div class="mb-3 sm:mb-4 pr-16"><h3 class="text-xl sm:text-2xl font-bold text-white mb-1 sm:mb-2" style="font-family:'Bebas Neue';">$${p.name}</h3><p class="text-xs text-cyan-400 font-mono break-all">${p.mint.slice(0,15)}...</p></div><div class="grid grid-cols-2 gap-3 sm:gap-4 mb-3 sm:mb-4"><div class="bg-black/30 rounded-lg p-2 sm:p-3 border border-cyan-500/20"><div class="flex items-center gap-1 sm:gap-2 mb-1"><span class="text-lime-400">💰</span><span class="text-xs text-cyan-300 uppercase tracking-wide">Liquidity</span></div><p class="text-sm sm:text-lg font-bold text-white">$${p.liquidity.toLocaleString()}</p></div><div class="bg-black/30 rounded-lg p-2 sm:p-3 border border-cyan-500/20"><div class="flex items-center gap-1 sm:gap-2 mb-1"><span class="text-cyan-400">👥</span><span class="text-xs text-cyan-300 uppercase tracking-wide">Holders</span></div><p class="text-sm sm:text-lg font-bold text-white">${p.holders.toLocaleString()}</p></div></div><div class="flex items-center gap-2 text-xs sm:text-sm text-cyan-400"><span>🕐</span><span>Launched ${p.launchTime}</span></div>`;
        card.addEventListener('click',()=>analyzeProject(p));
        grid.appendChild(card);
      });
    }
    
    function analyzeProject(p){
      currentProject=p;
      const liqScore=Math.min(100,Math.round(p.liquidity/1000));
      const holdScore=Math.min(100,Math.round(p.holders/10));
      const timeScore=Math.floor(Math.random()*40)+40;
      const overall=Math.round((liqScore+holdScore+timeScore)/3);
      const isIn=overall>=50;
      currentAnalysis={verdict:isIn?"IN":"OUT",confidence:overall,sharkQuote:isIn?"This has the fundamentals I'm looking for. I'm IN!":"The numbers don't justify the risk. I'm OUT.",metrics:{liquidity:liqScore,holders:holdScore,timing:timeScore,overall:overall},opportunities:["Early entry potential","Growing bags.fm ecosystem",`${p.holders} holders show interest`],risks:["High volatility risk","Concentration risk","No proven track record"],reasons:[`Liquidity of $${p.liquidity.toLocaleString()} shows ${liqScore>60?'strong':'weak'} backing`,`${p.holders} holders indicate ${holdScore>60?'solid':'concerning'} traction`,`Timing is ${timeScore>60?'favorable':'questionable'}`]};
      document.getElementById('verdict-content').innerHTML=`<div class="text-center py-8 sm:py-12 px-4 sm:px-6 rounded-2xl border-4 mb-6 ${isIn?'bg-gradient-to-br from-lime-900/50 to-green-900/30 border-lime-400 shadow-lime-400/50':'bg-gradient-to-br from-red-900/50 to-orange-900/30 border-red-500 shadow-red-500/50'} shadow-2xl"><div class="text-5xl sm:text-8xl font-black mb-3 sm:mb-4 animate-pulse" style="font-family:'Bebas Neue';"><span class="${isIn?'text-lime-400':'text-red-400'}">${isIn?"I'M IN! 🦈":"I'M OUT 👎"}</span></div><p class="text-lg sm:text-2xl text-white italic font-light mb-3 sm:mb-4 px-2">"${currentAnalysis.sharkQuote}"</p><div class="text-2xl sm:text-4xl font-bold text-white">${currentAnalysis.confidence}% Confidence</div></div><div class="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4 mb-6">${Object.entries(currentAnalysis.metrics).map(([k,v])=>`<div class="bg-black/40 rounded-xl p-3 sm:p-4 border border-cyan-500/30"><div class="text-xs text-cyan-400 uppercase tracking-wide mb-2">${k}</div><div class="text-xl sm:text-2xl font-bold text-white">${v}/100</div><div class="mt-2 h-2 bg-gray-800 rounded-full overflow-hidden"><div class="h-full rounded-full transition-all ${v>=70?'bg-gradient-to-r from-lime-400 to-green-500':v>=40?'bg-gradient-to-r from-yellow-500 to-orange-400':'bg-gradient-to-r from-red-500 to-orange-500'}" style="width:${v}%"></div></div></div>`).join('')}</div><div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6 mb-6"><div class="bg-gradient-to-br from-lime-900/30 to-green-900/20 border border-lime-500/30 rounded-xl p-4 sm:p-6"><div class="flex items-center gap-2 mb-3 sm:mb-4"><span class="text-2xl">📈</span><h3 class="text-lg sm:text-xl font-bold text-lime-300" style="font-family:'Bebas Neue';">OPPORTUNITIES</h3></div><ul class="space-y-2">${currentAnalysis.opportunities.map(o=>`<li class="text-sm sm:text-base text-lime-100 flex items-start gap-2"><span>🎯</span><span>${o}</span></li>`).join('')}</ul></div><div class="bg-gradient-to-br from-red-900/30 to-orange-900/20 border border-red-500/30 rounded-xl p-4 sm:p-6"><div class="flex items-center gap-2 mb-3 sm:mb-4"><span class="text-2xl">🚨</span><h3 class="text-lg sm:text-xl font-bold text-red-300" style="font-family:'Bebas Neue';">RED FLAGS</h3></div><ul class="space-y-2">${currentAnalysis.risks.map(r=>`<li class="text-sm sm:text-base text-red-100 flex items-start gap-2"><span>🛡️</span><span>${r}</span></li>`).join('')}</ul></div></div><div class="bg-gradient-to-br from-cyan-900/30 to-blue-900/20 border border-cyan-500/30 rounded-xl p-4 sm:p-6"><h3 class="text-lg sm:text-xl font-bold text-cyan-300 mb-3 sm:mb-4" style="font-family:'Bebas Neue';">SHARK'S REASONING</h3><ul class="space-y-2 sm:space-y-3">${currentAnalysis.reasons.map((r,i)=>`<li class="text-sm sm:text-lg text-cyan-100 flex items-start gap-2 sm:gap-3"><span class="text-lime-400 font-bold">${i+1}.</span><span>${r}</span></li>`).join('')}</ul></div>`;
      document.getElementById('analysis-panel').classList.remove('hidden');
      document.getElementById('analysis-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
    }
    
    document.getElementById('buy-btn').addEventListener('click',()=>{
      if(!currentProject)return;
      if(!wallet){alert('Please connect wallet first');return;}
      window.open(`https://jup.ag/swap/SOL-${currentProject.mint}`,'_blank');
    });
    
    document.getElementById('twitter-share-btn').addEventListener('click',async()=>{
      if(!currentProject||!currentAnalysis)return;
      const btn=document.getElementById('twitter-share-btn');
      const orig=btn.innerHTML;
      btn.disabled=true;
      btn.innerHTML='<span>Creating...</span>';
      try{
        const wm=document.getElementById('screenshot-watermark');
        wm.classList.remove('hidden');
        await new Promise(r=>setTimeout(r,100));
        const canvas=await html2canvas(document.getElementById('analysis-panel'),{backgroundColor:'#000000',scale:2,logging:false,useCORS:true});
        wm.classList.add('hidden');
        canvas.toBlob(b=>{
          const url=canvas.toDataURL('image/png');
          const link=document.createElement('a');
          link.download=`shark-tank-${currentProject.name}.png`;
          link.href=url;
          link.click();
          const emoji=currentAnalysis.confidence>=70?'🚀':currentAnalysis.confidence>=50?'📊':'⚠️';
          const tweet=`${emoji} SharkTank on @bags_fm from @athcamera rated $${currentProject.name} as ${currentAnalysis.verdict==='IN'?'✅ I\'M IN':'❌ I\'M OUT'}!\n\nConfidence: ${currentAnalysis.confidence}%\n💰 Liquidity: $${currentProject.liquidity.toLocaleString()}\n👥 ${currentProject.holders} holders\n\n"${currentAnalysis.sharkQuote}"\n\n@solana @BagsApp @MeteoraAG`;
          window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(tweet)}`,'_blank','width=550,height=420');
          btn.disabled=false;
          btn.innerHTML=orig;
          const msg=document.createElement('div');
          msg.className='fixed top-4 right-4 bg-lime-400 text-black px-6 py-3 rounded-full font-bold shadow-2xl z-50 animate-fade-in';
          msg.textContent='✅ Screenshot downloaded!';
          document.body.appendChild(msg);
          setTimeout(()=>msg.remove(),3000);
        },'image/png');
      }catch(e){
        console.error(e);
        document.getElementById('screenshot-watermark').classList.add('hidden');
        btn.disabled=false;
        btn.innerHTML=orig;
        alert('Screenshot failed');
      }
    });
    
    setTimeout(fetchTokens,1000);
    setInterval(fetchTokens,30000);
  </script>

  <style>
    @keyframes fade-in{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
    @keyframes slide-up{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
    @keyframes float{0%,100%{transform:translateY(0px);}50%{transform:translateY(-10px);}}
    .animate-fade-in{animation:fade-in 0.8s ease-out;animation-fill-mode:both;}
    .animate-slide-up{animation:slide-up 0.6s ease-out;}
    .animate-float{animation:float 3s ease-in-out infinite;}
    .delay{animation-delay:1s;}
  </style>
</body>
</html>
