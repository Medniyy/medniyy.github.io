<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGS.FM SHARK TANK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #000; color: white; overflow: hidden; }
        .font-bebas { font-family: 'Bebas Neue', sans-serif; }
        #feed-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .token-slide { height: 100vh; scroll-snap-align: start; position: relative; overflow: hidden; }
        .glass-panel { background: rgba(12, 12, 12, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-modal { background: rgba(5, 5, 5, 0.98); }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="text-white">

    <div id="disclaimer-modal" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-lg w-full">
            <h1 class="text-5xl font-bebas text-white mb-2">DYOR ZONE</h1>
            <p class="text-gray-400 text-lg mb-8">Live Feed. High Risk. No Financial Advice.</p>
            <button onclick="acceptRisk()" class="w-full bg-lime-500 hover:bg-lime-400 text-black font-bebas text-2xl py-4 rounded-xl">ENTER</button>
        </div>
    </div>

    <header class="fixed top-0 w-full z-50 p-4 pointer-events-none">
        <div class="max-w-md mx-auto flex justify-between items-center pointer-events-auto">
            <div class="flex items-center gap-3">
                <img src="bags-logo.png" onerror="this.src='https://placehold.co/40x40/000/FFF?text=$'" class="w-10 h-10 rounded-full border border-lime-500">
                <h1 class="text-xl font-bebas leading-none">BAGS.FM <span class="text-lime-400">SHARK</span></h1>
            </div>
            <button onclick="openInfo()" class="w-10 h-10 rounded-full glass-panel flex items-center justify-center">?</button>
        </div>
    </header>

    <div id="feed-container">
        <div class="h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="animate-spin w-12 h-12 border-4 border-lime-400 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p class="text-lime-400 font-bebas text-xl">Loading Feed...</p>
            </div>
        </div>
    </div>

    <div id="analytics-modal" class="fixed inset-0 z-[60] glass-modal hidden flex items-center justify-center p-4">
        <div class="w-full max-w-md relative">
            <button onclick="closeAnalytics()" class="absolute -top-12 right-0 text-white text-4xl">&times;</button>
            <div id="analytics-content" class="bg-gray-900 border border-lime-500/30 rounded-3xl p-6"></div>
            <div class="mt-4 flex gap-3">
                <button onclick="buyToken()" class="flex-1 bg-lime-500 text-black font-bebas text-xl py-4 rounded-xl">BUY NOW ↗</button>
                <button onclick="shareTweet()" class="flex-1 bg-gray-800 text-white font-bebas text-xl py-4 rounded-xl border border-gray-700">SHARE</button>
            </div>
        </div>
    </div>

    <div id="info-modal" class="fixed inset-0 z-[60] bg-black/95 hidden flex items-center justify-center p-4">
        <div class="max-w-md w-full glass-panel rounded-3xl p-8 relative">
            <button onclick="closeInfo()" class="absolute top-4 right-4 text-gray-500 hover:text-white">✕</button>
            <h2 class="text-4xl font-bebas text-lime-400 mb-4">LOGIC</h2>
            <ul class="text-sm text-gray-400 space-y-2 list-disc pl-5">
                <li>Green: Holders > 300, Vol > 20k</li>
                <li>Yellow: Holders > 150</li>
                <li>Red: Low momentum</li>
            </ul>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://bags-shark-tank-api.privetandreynugdejeti.workers.dev';
        let activeTokens = [];
        let currentTokenIndex = 0;
        let currentAnalysis = null;

        // INIT
        if(localStorage.getItem('riskAccepted') === 'true') {
            document.getElementById('disclaimer-modal').style.display = 'none';
            fetchTokens();
        }

        function acceptRisk() {
            localStorage.setItem('riskAccepted', 'true');
            document.getElementById('disclaimer-modal').style.display = 'none';
            fetchTokens();
        }

        async function fetchTokens() {
            try {
                const res = await fetch(WORKER_URL);
                const tokens = await res.json();
                activeTokens = tokens;
                renderFeed(tokens);
            } catch (e) {
                console.error(e);
            }
        }

        function renderFeed(tokens) {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            
            tokens.forEach((token, index) => {
                const ageMins = Math.floor((Date.now() - token.created) / 60000);
                const logo = token.image || 'bags-logo.png';
                
                const slide = document.createElement('div');
                slide.className = 'token-slide flex items-center justify-center p-4 snap-center';
                slide.innerHTML = `
                    <div class="glass-panel w-full max-w-md rounded-3xl p-6 text-center shadow-2xl">
                        <div class="absolute top-4 right-4 bg-lime-500 text-black text-xs font-bold px-3 py-1 rounded-full">LIVE</div>
                        <img src="${logo}" onerror="this.src='bags-logo.png'" class="w-24 h-24 mx-auto mb-4 rounded-full border-4 border-lime-500 object-cover">
                        <h2 class="text-5xl font-bebas text-white mb-1 truncate">${token.name}</h2>
                        <p class="text-gray-400 mb-6 font-mono text-xs">${token.mint.slice(0,6)}...${token.mint.slice(-4)}</p>
                        
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <div class="bg-black/40 rounded-xl p-3 border border-white/10">
                                <div class="text-[10px] text-gray-500 font-bold">LIQUIDITY</div>
                                <div class="text-2xl font-bebas text-lime-400">$${token.liquidity.toLocaleString()}</div>
                            </div>
                            <div class="bg-black/40 rounded-xl p-3 border border-white/10">
                                <div class="text-[10px] text-gray-500 font-bold">HOLDERS</div>
                                <div class="text-2xl font-bebas text-white">${token.holders}</div>
                            </div>
                        </div>

                        <div class="flex flex-col gap-3">
                            <button onclick="analyzeProject(${index})" class="w-full bg-gray-800 text-lime-400 border border-lime-500/50 font-bebas text-2xl py-3 rounded-xl">🦈 SHARK VERDICT</button>
                            <button onclick="buyToken(${index})" class="w-full bg-lime-500 text-black font-bebas text-2xl py-3 rounded-xl hover:scale-105 transition">BUY NOW ↗</button>
                        </div>
                    </div>
                `;
                container.appendChild(slide);
            });
        }

        function analyzeProject(index) {
            const token = activeTokens[index];
            currentTokenIndex = index;
            
            // Аналитика (Твоя формула упрощенная для надежности)
            let score = 0;
            if(token.holders > 300) score += 4;
            else if(token.holders > 150) score += 2;
            
            if(token.volume5m > 15000) score += 3;
            else if(token.volume5m > 5000) score += 1;
            
            if(token.liquidity > 20000) score += 3;
            
            let verdict = score >= 7 ? "STRONG IN" : (score >= 4 ? "WATCH" : "OUT");
            let color = score >= 7 ? "text-lime-400" : (score >= 4 ? "text-yellow-400" : "text-red-500");

            currentAnalysis = { verdict, score, token };

            const modal = document.getElementById('analytics-modal');
            const content = document.getElementById('analytics-content');
            
            content.innerHTML = `
                <div class="text-center mb-6 border-b border-white/10 pb-6">
                    <div class="text-6xl font-black mb-2 animate-pulse ${color}" style="font-family:'Bebas Neue';">${verdict}</div>
                    <div class="text-3xl font-bold text-white">SCORE: ${score}/10</div>
                </div>
                <div class="space-y-2 text-sm text-gray-400">
                    <div class="flex justify-between"><span>Holders:</span> <span class="text-white">${token.holders}</span></div>
                    <div class="flex justify-between"><span>Vol 5m:</span> <span class="text-white">$${token.volume5m}</span></div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function buyToken(index) {
            const idx = index !== undefined ? index : currentTokenIndex;
            const token = activeTokens[idx];
            // Прямая ссылка на Jupiter
            window.open(`https://jup.ag/swap/SOL-${token.mint}`, '_blank');
        }

        function closeAnalytics() { document.getElementById('analytics-modal').classList.add('hidden'); }
        function openInfo() { document.getElementById('info-modal').classList.remove('hidden'); }
        function closeInfo() { document.getElementById('info-modal').classList.add('hidden'); }

        function shareTweet() {
            if(!currentAnalysis) return;
            const text = `${currentAnalysis.verdict} on $${currentAnalysis.token.name} 🦈 Score: ${currentAnalysis.score}/10. via @bagsfm @athcamera`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
